<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bonne nuit</title>

<style>
  :root{
    --bgA:#06000b;
    --bgB:#0b0014;
    --bgC:#170024;
    --vio:#b27eff;
    --vio2:#6f2cff;
    --pink:#ff9cff;
    --txt:#eddcff;
    --muted:rgba(255,255,255,.80);
  }

  html,body{
    margin:0; height:100%;
    overflow:hidden;
    background:
      radial-gradient(1200px 900px at 70% 15%, rgba(178,126,255,.16), transparent 60%),
      radial-gradient(900px 750px at 20% 78%, rgba(255,156,255,.10), transparent 58%),
      linear-gradient(160deg,var(--bgB),var(--bgC));
    color:var(--txt);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    touch-action: manipulation;
    cursor:none;
  }

  /* Vignette dark + “sexy glow” subtil */
  #vignette{
    position:fixed; inset:-40px;
    pointer-events:none;
    z-index:2;
    background:
      radial-gradient(900px 650px at 50% 16%, rgba(255,156,255,.06), transparent 60%),
      radial-gradient(900px 700px at 30% 75%, rgba(111,44,255,.08), transparent 58%),
      radial-gradient(900px 900px at 50% 50%, transparent 45%, rgba(0,0,0,.68) 92%);
  }

  /* Canvas FX (chaînes + papillons) */
  #fx{
    position:fixed; inset:0;
    z-index:1;
    pointer-events:none;
  }

  /* Curseur = emoji papillon */
  #cursor{
    position:fixed;
    transform:translate(-50%,-50%);
    z-index:9;
    pointer-events:none;
    font-size:28px;
    filter: drop-shadow(0 0 12px rgba(178,126,255,.45));
  }

  /* Intro */
  #intro{
    position:fixed; inset:0;
    background:#000;
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:22px;
    text-align:center;
  }
  #introCard{
    max-width: 920px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.03);
    border-radius: 18px;
    padding: 22px 18px;
    box-shadow: 0 0 44px rgba(111,44,255,.18);
    backdrop-filter: blur(12px);
  }
  #introText{
    font-size:18px;
    line-height:1.55;
    color:#eadbff;
  }
  #count{
    margin-top:14px;
    font-size:36px;
    color:var(--vio);
    text-shadow: 0 0 18px rgba(178,126,255,.35);
  }
  #hint{
    margin-top:10px;
    font-size:14px;
    opacity:.9;
    color:var(--muted);
  }

  /* “bonne nuit” + “pardon :(” (fumée) */
  .bn, .pardon{
    position:absolute;
    white-space:nowrap;
    pointer-events:none;
    z-index:3;
    left:0; top:0;
    transform: translate(-50%,-50%);
    opacity:0;
  }
  .bn{
    font-size:18px;
    color:#e7b8ff;
    text-shadow: 0 0 14px rgba(178,126,255,.22);
    animation: smokeText 2.25s ease-out forwards;
  }
  .pardon{
    font-size:17px;
    color:#ffb0ff;
    text-shadow: 0 0 14px rgba(255,156,255,.18);
    animation: smokeText 2.25s ease-out forwards;
  }

  @keyframes smokeText{
    0%{ opacity:0; filter: blur(0px); transform: translate(-50%,-40%) scale(.98) rotate(var(--r,0deg)); }
    12%{ opacity:1; }
    55%{ filter: blur(1.2px); }
    100%{ opacity:0; filter: blur(3px); transform: translate(-50%,-80%) scale(.92) rotate(var(--r,0deg)); }
  }

  /* petites particules fumée */
  .smoke{
    position:absolute;
    width:6px; height:6px;
    border-radius:999px;
    background: rgba(178,126,255,.22);
    box-shadow: 0 0 10px rgba(255,156,255,.10);
    pointer-events:none;
    z-index:3;
    transform: translate(-50%,-50%);
    animation: smokeDot 1.35s ease-out forwards;
  }
  @keyframes smokeDot{
    0%{ opacity:.85; filter: blur(.3px); transform: translate(-50%,-50%) scale(1); }
    100%{ opacity:0; filter: blur(2.2px); transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.45); }
  }

  /* cœurs */
  .heart{
    position:absolute;
    font-size:14px;
    color:var(--pink);
    text-shadow: 0 0 12px rgba(255,156,255,.32);
    pointer-events:none;
    z-index:4;
    transform: translate(-50%,-50%);
    animation: heartPop 1.05s ease-out forwards;
  }
  @keyframes heartPop{
    0%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-90%) scale(.78); }
  }

  /* je / t'aime */
  .fly{
    position:absolute;
    font-size:18px;
    color:#fff;
    text-shadow: 0 0 18px rgba(178,126,255,.35);
    pointer-events:none;
    z-index:5;
    transform: translate(-50%,-50%);
    animation: flyWord 1.25s cubic-bezier(.2,.85,.2,1) forwards;
  }
  @keyframes flyWord{
    0%{ opacity:1; transform:translate(-50%,-50%) translateY(2px); }
    100%{ opacity:0; transform:translate(-50%,-50%) translateY(-58px); }
  }

  /* chat */
  .chat{
    position:absolute;
    font-size:12px;
    color:#ffd6ff;
    text-shadow: 0 0 12px rgba(255,156,255,.22);
    pointer-events:none;
    z-index:5;
    transform: translate(-50%,-50%);
    animation: chatFade 1.2s ease-out forwards;
  }
  @keyframes chatFade{
    0%{ opacity:0; transform:translate(-50%,-30%) scale(.96); }
    18%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-75%) scale(.92); }
  }

  /* boutons (visibles après intro) */
  .btn{
    position:fixed;
    z-index:8;
    display:none;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.40);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(111,44,255,.14);
    user-select:none;
    -webkit-tap-highlight-color: transparent;
    color:var(--txt);
  }

  #feetBtn{
    top:16px; right:16px;
    border-radius: 16px;
    padding: 10px 12px;
    cursor:pointer;
    min-width: 210px;
  }
  #feetBtn:hover{ transform: translateY(-1px); }
  #feetRow{ display:flex; gap:10px; align-items:center; justify-content:flex-end; }
  #feetEmoji{
    font-size:26px;
    filter: drop-shadow(0 0 12px rgba(178,126,255,.25));
  }
  #feetText{ font-size:13px; opacity:.95; }

  #tulipBtn{
    left:16px; bottom:16px;
    border-radius:999px;
    padding: 10px 14px;
    cursor:pointer;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform: translateY(0); box-shadow: 0 0 26px rgba(255,156,255,.12); }
    50%{ transform: translateY(-2px); box-shadow: 0 0 34px rgba(255,156,255,.16); }
  }
  #tulipBtn span{ display:inline-flex; gap:10px; align-items:center; font-size:14px; opacity:.96; }
  #tulipBtn .icon{ font-size:20px; }

  @media (max-width:520px){
    #introText{ font-size:16px; }
    #feetBtn{ min-width: 190px; }
  }
</style>
</head>

<body>
<canvas id="fx"></canvas>
<div id="vignette"></div>

<div id="cursor">🦋</div>

<div id="intro">
  <div id="introCard">
    <div id="introText"></div>
    <div id="count">20</div>
    <div id="hint">Reste un peu petit chat de con y a des easter eggs</div>
  </div>
</div>

<div id="feetBtn" class="btn" title="clique pour voir mes pieds">
  <div id="feetRow">
    <div id="feetEmoji">🦶</div>
    <div id="feetText"><b>clique</b> pour voir mes pieds</div>
  </div>
</div>

<div id="tulipBtn" class="btn" title="clique si tu m'aimes et que tu me pardonnes">
  <span><span class="icon">🌷</span> clique si tu m'aimes et que tu me pardonne</span>
</div>

<script>
  /* ====== jours depuis 03/10/2006 ====== */
  const birth = new Date(2006,9,3);
  const now = new Date();
  const diffDays = Math.floor((now - birth) / (1000*60*60*24));

  document.getElementById("introText").innerHTML =
    `voici <b>${diffDays}</b> bonne nuit pour chaque jour depuis ta naissance où comme le gros idiot que je suis je te l'ai pas souhaité`;

  /* ====== curseur smooth follow ====== */
  const cursor = document.getElementById("cursor");
  let cx = innerWidth/2, cy = innerHeight/2;
  let tx = cx, ty = cy;

  function setTarget(x,y){ tx=x; ty=y; }
  function cursorLoop(){
    cx += (tx - cx) * 0.22;
    cy += (ty - cy) * 0.22;
    cursor.style.left = cx + "px";
    cursor.style.top  = cy + "px";
    requestAnimationFrame(cursorLoop);
  }
  cursorLoop();

  addEventListener("mousemove", e => { setTarget(e.clientX,e.clientY); });
  addEventListener("touchmove", e => {
    if(!e.touches[0]) return;
    setTarget(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});

  /* ====== FX canvas: CHAÎNES (maillons) + PAPILLONS ====== */
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");

  function resize(){
    canvas.width = innerWidth * devicePixelRatio;
    canvas.height = innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  addEventListener("resize", resize);
  resize();

  const rnd = (a,b)=> a + Math.random()*(b-a);

  // Chaînes: barres de maillons qui se balancent
  const chains = [];
  for(let i=0;i<10;i++){
    chains.push({
      x: rnd(-200, innerWidth+200),
      y: rnd(-100, innerHeight+100),
      len: rnd(650, 1200),
      baseRot: rnd(-0.9, 0.9),
      sway: rnd(0.18, 0.35),
      sp: rnd(0.0018, 0.0038),
      t: rnd(0, Math.PI*2),
      a: rnd(0.14, 0.22),     // plus visible
      link: rnd(24, 30)
    });
  }

  // Papillons fond
  const bgBflies = [];
  for(let i=0;i<28;i++){
    bgBflies.push({
      x: rnd(0, innerWidth),
      y: rnd(innerHeight, innerHeight+520),
      s: rnd(0.75, 1.45),
      vy: rnd(0.20, 0.78),
      vx: rnd(-0.22, 0.22),
      wob: rnd(0, Math.PI*2),
      ws: rnd(0.010, 0.020),
      a: rnd(0.12, 0.24)
    });
  }

  // Papillons “fixent” le curseur (suiveurs + perch)
  const followers = [];
  for(let i=0;i<10;i++){
    followers.push({
      x: cx + rnd(-80,80),
      y: cy + rnd(-80,80),
      vx:0, vy:0,
      s: rnd(0.70, 1.05),
      a: rnd(0.20, 0.32),
      phase: rnd(0, Math.PI*2),
      perch: 0
    });
  }

  function drawChain(c){
    c.t += c.sp;
    const rot = c.baseRot + Math.sin(c.t) * c.sway;

    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(rot);
    ctx.globalAlpha = c.a;

    // “corde” sombre derrière
    ctx.strokeStyle = "rgba(255,255,255,0.10)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-c.len/2, 0);
    ctx.lineTo(c.len/2, 0);
    ctx.stroke();

    // maillons métalliques
    for(let x=-c.len/2; x<=c.len/2; x+=c.link){
      const grad = ctx.createLinearGradient(x-12,0,x+12,0);
      grad.addColorStop(0,"rgba(0,0,0,0.00)");
      grad.addColorStop(0.35,"rgba(178,126,255,0.25)");
      grad.addColorStop(0.6,"rgba(255,255,255,0.10)");
      grad.addColorStop(1,"rgba(0,0,0,0.00)");
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.ellipse(x, 0, 14, 7, 0.25, 0, Math.PI*2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawButterfly(x,y,scale,alpha,tilt,glow=false){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tilt);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;

    if(glow){
      ctx.shadowColor = "rgba(178,126,255,0.28)";
      ctx.shadowBlur = 16;
    } else {
      ctx.shadowBlur = 0;
    }

    // ailes (formes plus “papillon”)
    ctx.fillStyle = "rgba(111,44,255,0.55)";
    ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(-4,-2);
    ctx.quadraticCurveTo(-22,-14,-22,2);
    ctx.quadraticCurveTo(-22,16,-4,10);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = "rgba(178,126,255,0.45)";
    ctx.beginPath();
    ctx.moveTo(4,-2);
    ctx.quadraticCurveTo(22,-14,22,2);
    ctx.quadraticCurveTo(22,16,4,10);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // corps
    ctx.strokeStyle = "rgba(0,0,0,0.65)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0,-14);
    ctx.lineTo(0,14);
    ctx.stroke();

    // antennes
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-1,-14); ctx.lineTo(-10,-20);
    ctx.moveTo(1,-14);  ctx.lineTo(10,-20);
    ctx.stroke();

    ctx.restore();
  }

  function fxLoop(){
    ctx.clearRect(0,0,innerWidth,innerHeight);

    // chaînes balancent
    for(const c of chains) drawChain(c);

    // papillons fond
    for(const b of bgBflies){
      b.wob += b.ws;
      b.y -= b.vy;
      b.x += b.vx + Math.sin(b.wob)*0.35;

      if(b.y < -160){
        b.y = innerHeight + rnd(160,540);
        b.x = rnd(0, innerWidth);
      }
      const tilt = Math.sin(b.wob*2)*0.22;
      drawButterfly(b.x, b.y, b.s, b.a, tilt, false);
    }

    // papillons “fixent” le curseur
    for(const f of followers){
      f.phase += 0.06;

      // perch: se pose près du curseur 0.6 à 1.4 sec
      if(f.perch <= 0 && Math.random() < 0.0030){
        f.perch = rnd(0.6, 1.4);
      }

      if(f.perch > 0){
        f.perch -= 1/60;
        const px = cx + Math.cos(f.phase)*10;
        const py = cy + Math.sin(f.phase)*8;
        f.x += (px - f.x) * 0.22;
        f.y += (py - f.y) * 0.22;
      } else {
        const targetX = cx + Math.cos(f.phase)*44;
        const targetY = cy + Math.sin(f.phase)*36;
        f.vx += (targetX - f.x) * 0.004;
        f.vy += (targetY - f.y) * 0.004;
        f.vx *= 0.86;
        f.vy *= 0.86;
        f.x += f.vx;
        f.y += f.vy;
      }

      const tilt = Math.sin(f.phase)*0.30;
      drawButterfly(f.x, f.y, f.s, f.a, tilt, true);
    }

    requestAnimationFrame(fxLoop);
  }
  fxLoop();

  /* ====== Countdown 20s ====== */
  let sec = 20;
  const countEl = document.getElementById("count");
  const introEl = document.getElementById("intro");
  const feetBtn = document.getElementById("feetBtn");
  const tulipBtn = document.getElementById("tulipBtn");

  let bnCount = 0;
  let bnTimer = null;

  const cd = setInterval(()=>{
    sec--;
    countEl.textContent = sec;
    if(sec<=0){
      clearInterval(cd);
      introEl.style.display="none";
      feetBtn.style.display="block";
      tulipBtn.style.display="block";
      startLoop();
    }
  }, 1000);

  /* ====== spawn text + fumée ====== */
  function spawnSmoke(x,y,amount=6){
    for(let i=0;i<amount;i++){
      const s = document.createElement("div");
      s.className = "smoke";
      s.style.left = x + "px";
      s.style.top  = y + "px";
      s.style.setProperty("--dx", (rnd(-26,26))+"px");
      s.style.setProperty("--dy", (rnd(-38,-14))+"px");
      document.body.appendChild(s);
      setTimeout(()=> s.remove(), 1350);
    }
  }

  function spawnText(cls, text){
    const el = document.createElement("div");
    el.className = cls;
    el.textContent = text;

    const x = Math.random()*innerWidth;
    const y = Math.random()*innerHeight;

    el.style.left = x+"px";
    el.style.top  = y+"px";
    el.style.setProperty("--r", (Math.random()*360)+"deg");

    document.body.appendChild(el);
    spawnSmoke(x,y, 5);

    setTimeout(()=> el.remove(), 2250);
  }

  function startLoop(){
    if(bnTimer) clearInterval(bnTimer);
    bnTimer = setInterval(()=>{
      if(bnCount >= diffDays) bnCount = 0;
      bnCount++;

      spawnText("bn", "bonne nuit");

      if(Math.random() < 0.24){
        spawnText("pardon", "pardon :(");
      }
    }, 230);
  }

  /* ====== clics / coeurs / je / t'aime / chat ====== */
  let clickCount = 0;
  let holdTimeout = null;
  let holdLoop = null;

  function spawnHeart(x,y){
    const h=document.createElement("div");
    h.className="heart";
    h.textContent="❤";
    h.style.left=x+"px"; h.style.top=y+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1050);
  }

  function spawnFly(x,y,t){
    const f=document.createElement("div");
    f.className="fly";
    f.textContent=t;
    f.style.left=x+"px"; f.style.top=y+"px";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1250);
  }

  function spawnChat(x,y){
    const c=document.createElement("div");
    c.className="chat";
    c.textContent="petit chat 🐾";
    c.style.left=x+"px"; c.style.top=y+"px";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1200);
  }

  function handleClick(x,y){
    clickCount++;
    spawnHeart(x,y);
    spawnSmoke(x,y, 4);

    if(clickCount%3===0) spawnFly(x,y,"je");
    if(clickCount%10===0) spawnFly(x,y,"t'aime");
  }

  function beginHold(x,y){
    clearTimeout(holdTimeout);
    clearInterval(holdLoop);
    holdTimeout=setTimeout(()=>{
      spawnChat(x,y);
      holdLoop=setInterval(()=> spawnChat(x,y), 2000);
    },2000);
  }

  function endHold(){
    clearTimeout(holdTimeout);
    clearInterval(holdLoop);
  }

  addEventListener("mousedown",e=> beginHold(e.clientX,e.clientY));
  addEventListener("mouseup",e=> { endHold(); handleClick(e.clientX,e.clientY); });

  addEventListener("touchstart",e=>{
    if(!e.touches[0]) return;
    const t=e.touches[0];
    beginHold(t.clientX,t.clientY);
  },{passive:true});

  addEventListener("touchend",e=>{
    endHold();
    if(!e.changedTouches[0]) return;
    const t=e.changedTouches[0];
    handleClick(t.clientX,t.clientY);
  });

  /* ====== liens pieds / tulipe ====== */
  feetBtn.addEventListener("click", ()=>{
    const w = window.open("");
    w.document.write(`
      <body style="margin:0;background:#000;color:#fff;text-align:center;font-family:Arial">
        <div style="padding:18px">
          <img src="sukuna.jpg" style="max-width:92%;border-radius:14px;box-shadow:0 0 35px rgba(178,126,255,.18);margin-top:8px">
          <p style="margin-top:18px;font-size:18px;line-height:1.4;opacity:.95">
            OUPS c'est juste une rare photo de moi et mommy<br>
            espèce de grosse gourmande j'envoie pas mes pieds comme ça
          </p>
        </div>
      </body>
    `);
  });

  tulipBtn.addEventListener("click", ()=>{
    const w = window.open("");
    w.document.write(`
      <body style="margin:0;background:#000;color:#fff;text-align:center;font-family:Arial">
        <div style="padding:18px">
          <img src="image.jpg" style="max-width:92%;border-radius:14px;box-shadow:0 0 35px rgba(255,156,255,.12);margin-top:8px">
          <p style="margin-top:18px;font-size:18px;line-height:1.4;opacity:.95">
            tu savais au fond de toi qu'il fallait pas cliquer...<br>
            mais c'est trop tard petit chat j'ai gagné
          </p>
        </div>
      </body>
    `);
  });
</script>
</body>
</html>
